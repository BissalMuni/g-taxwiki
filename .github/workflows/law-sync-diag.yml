name: law-sync diag (임시)

# 진단 전용: GH Actions 러너에서 law.go.kr 도달 가능성 확인. 확인 후 삭제.
on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: connectivity diagnostics
        run: |
          echo "== (1) 대조군: api.github.com =="
          curl -sS -o /dev/null -w "github: http=%{http_code} time=%{time_total}s\n" --max-time 20 https://api.github.com || echo "github FAILED rc=$?"

          echo "== (2) DNS: www.law.go.kr =="
          getent hosts www.law.go.kr || echo "getent DNS FAILED"

          echo "== (3) law.go.kr 루트 (verbose 마지막) =="
          curl -vsS -o /dev/null -w "law-root: http=%{http_code} time=%{time_total}s\n" --max-time 25 https://www.law.go.kr/ 2>&1 | tail -20 || echo "law-root FAILED rc=$?"

          echo "== (4) DRF API =="
          curl -sS -o /dev/null -w "drf: http=%{http_code} time=%{time_total}s\n" --max-time 25 "https://www.law.go.kr/DRF/lawSearch.do?OC=minh0313&target=law&type=JSON&query=%EC%A7%80%EB%B0%A9%EC%84%B8%EB%B2%95" || echo "drf FAILED rc=$?"
